<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Reactor Hologram Control</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #00e5ff;
            text-shadow: 0 0 10px #00e5ff;
            pointer-events: none;
            z-index: 100;
        }
        #input_video { display: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="status">INITIALIZING...</h2>
        <p>Raise hand to control Mark 1 Reactor</p>
    </div>
    
    <video id="input_video"></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const statusEl = document.getElementById('status');
        let arcReactor;
        let targetRotationX = 0;
        let targetRotationY = 0;

        // --- 1. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        
        const pointLight = new THREE.PointLight(0x00d4ff, 15, 10);
        pointLight.position.set(0, 0, 1);
        scene.add(pointLight);

        // --- 3. LOAD ARC REACTOR ---
        const loader = new GLTFLoader();
        loader.load('scene.gltf', (gltf) => {
            arcReactor = gltf.scene;
            
            // Centering logic
            const box = new THREE.Box3().setFromObject(arcReactor);
            const center = box.getCenter(new THREE.Vector3());
            arcReactor.position.sub(center);
            arcReactor.scale.set(0.6, 0.6, 0.6); 

            // Make the LED parts glow
            arcReactor.traverse((node) => {
                if (node.isMesh) {
                    node.material.emissive = new THREE.Color(0x0066ff);
                    node.material.emissiveIntensity = 2;
                }
            });
            
            scene.add(arcReactor);
            statusEl.innerText = "REACTOR ONLINE";
        }, (xhr) => {
            statusEl.innerText = `LOADING: ${Math.round(xhr.loaded / xhr.total * 100)}%`;
        });

        // --- 4. HAND GESTURE LOGIC (MEDIAPIPE) ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // Keeps 60FPS on Realme C25
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Index Finger Tip (Landmark 8) controls rotation
                const indexTip = landmarks[8];
                
                // Map coordinates to rotation angles
                targetRotationY = (indexTip.x - 0.5) * 6;
                targetRotationX = (indexTip.y - 0.5) * 6;
            }
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();

        // --- 5. RENDER & SMOOTHING ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (arcReactor) {
                // Smooth rotation interpolation (Lerp)
                arcReactor.rotation.y += (targetRotationY - arcReactor.rotation.y) * 0.08;
                arcReactor.rotation.x += (targetRotationX - arcReactor.rotation.x) * 0.08;
                
                // Idle pulse effect
                const pulse = 0.6 + Math.sin(Date.now() * 0.003) * 0.015;
                arcReactor.scale.set(pulse, pulse, pulse);
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
    </html>
